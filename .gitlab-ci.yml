image: vvakame/review:5.9

build-pdf:
  script: # build-in-docker.sh の終盤と同じもの
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends graphviz
    - ./setup.sh
    - npm run pdf
  artifacts:
    paths:
      - articles/ReVIEW-Template.pdf
  tags:
    - docker

